[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "check-yaml" },
  { id = "end-of-file-fixer" },
  { id = "trailing-whitespace" },
  { id = "check-toml" },
  { id = "detect-private-key" },
  { id = "no-commit-to-branch" },
]

[[repos]]
repo = "https://github.com/compilerla/conventional-pre-commit"
rev = "v4.4.0"
hooks = [
  { id = "conventional-pre-commit", stages = ["commit-msg"], args = ["--verbose", "--strict", "--force-scope", "feat", "fix", "chore", "test", "docs", "ci", "refactor", "performance"] },
]
